<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"                  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable"    content="yes">
  <title>ClassiCube Web</title>
  <style>
    /*
     * Nord dark theme with glassmorphism
     * ─────────────────────────────────────────────────────────────
     * Polar Night : #2E3440  #3B4252  #434C5E  #4C566A
     * Snow Storm  : #D8DEE9  #E5E9F0  #ECEFF4
     * Frost       : #8FBCBB  #88C0D0  #81A1C1  #5E81AC
     * Aurora      : #BF616A  #D08770  #EBCB8B  #A3BE8C  #B48EAD
     */

    /* ---- Reset ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #2E3440;
      color: #D8DEE9;
      overflow-x: hidden;
    }

    /* Layered animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 65% 55% at 12% 18%, rgba(136,192,208,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 75% 65% at 88% 78%, rgba(94,129,172,0.09)  0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 55% 42%, rgba(180,142,173,0.05) 0%, transparent 70%),
        linear-gradient(155deg, #2E3440 0%, #3B4252 60%, #2E3440 100%);
      animation: bgPulse 24s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { opacity: 1;    filter: hue-rotate(0deg);  }
      50%  { opacity: 0.92; filter: hue-rotate(7deg);  }
      100% { opacity: 1;    filter: hue-rotate(-5deg); }
    }

    /* ---- App shell ---- */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(46, 52, 64, 0.72);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      padding: 11px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(136, 192, 208, 0.16);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }
    #app-header h1 {
      font-size: 1.18rem;
      color: #88C0D0;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-shadow: 0 0 22px rgba(136, 192, 208, 0.28);
    }

    #header-badges { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.76rem;
      font-weight: 600;
      display: none;
      white-space: nowrap;
      letter-spacing: 0.2px;
      transition: opacity 0.2s;
    }
    .badge-google {
      background: rgba(94, 129, 172, 0.2);
      color: #81A1C1;
      border: 1px solid rgba(94, 129, 172, 0.35);
    }
    .badge-cc {
      background: rgba(163, 190, 140, 0.18);
      color: #A3BE8C;
      border: 1px solid rgba(163, 190, 140, 0.32);
    }

    #app-body { flex: 1; overflow-y: auto; padding: 36px 20px; }

    /* ---- Views ---- */
    .view { display: none; }
    .view.active { display: block; }

    /* ---- Cards (glassmorphism) ---- */
    .card {
      background: rgba(59, 66, 82, 0.52);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(136, 192, 208, 0.13);
      border-radius: 16px;
      padding: 30px;
      max-width: 520px;
      margin: 0 auto 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.38),
        0 1px 0 rgba(255, 255, 255, 0.04) inset;
    }
    .card h2 {
      color: #88C0D0;
      margin-bottom: 22px;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* ---- Form fields ---- */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.75rem;
      color: #81A1C1;
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 10px 14px;
      background: rgba(46, 52, 64, 0.65);
      border: 1px solid rgba(76, 86, 106, 0.65);
      border-radius: 8px;
      color: #ECEFF4;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(76, 86, 106, 0.9); }
    input:focus {
      border-color: rgba(136, 192, 208, 0.55);
      box-shadow: 0 0 0 3px rgba(136, 192, 208, 0.1);
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 22px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.18s, transform 0.12s, box-shadow 0.18s;
    }
    .btn:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.32);
    }
    .btn:active:not(:disabled) { transform: scale(0.97) translateY(0); box-shadow: none; }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-block { display: flex; width: 100%; margin-top: 10px; }
    .btn-primary {
      background: rgba(94, 129, 172, 0.82);
      color: #ECEFF4;
      border-color: rgba(94, 129, 172, 0.35);
    }
    .btn-green {
      background: rgba(163, 190, 140, 0.82);
      color: #2E3440;
      border-color: rgba(163, 190, 140, 0.35);
    }
    .btn-gray {
      background: rgba(76, 86, 106, 0.6);
      color: #D8DEE9;
      border-color: rgba(76, 86, 106, 0.32);
    }
    .btn-red {
      background: rgba(191, 97, 106, 0.82);
      color: #ECEFF4;
      border-color: rgba(191, 97, 106, 0.35);
    }
    .btn-sm { padding: 6px 16px; font-size: 0.82rem; }

    /* ---- Alerts ---- */
    .alert {
      padding: 11px 15px;
      border-radius: 8px;
      font-size: 0.86rem;
      margin-bottom: 16px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .alert-error {
      background: rgba(191, 97, 106, 0.14);
      border-left: 3px solid #BF616A;
      color: #BF616A;
    }
    .alert-info {
      background: rgba(94, 129, 172, 0.14);
      border-left: 3px solid #5E81AC;
      color: #81A1C1;
    }
    .alert-warn {
      background: rgba(235, 203, 139, 0.12);
      border-left: 3px solid #EBCB8B;
      color: #EBCB8B;
    }

    /* ---- Divider ---- */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #4C566A;
      font-size: 0.75rem;
      margin: 18px 0;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(76, 86, 106, 0.5);
    }

    /* ---- Hint text ---- */
    .hint { font-size: 0.75rem; color: #4C566A; margin-top: 12px; text-align: center; }

    /* ---- Server browser ---- */
    .server-filters {
      display: flex;
      gap: 10px;
      max-width: 900px;
      margin: 0 auto 16px;
    }
    .server-filters input { flex: 1; }

    #server-list { max-width: 900px; margin: 0 auto; }

    .server-card {
      background: rgba(59, 66, 82, 0.46);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      border: 1px solid rgba(76, 86, 106, 0.42);
      border-radius: 10px;
      padding: 13px 17px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .server-card:hover {
      border-color: rgba(136, 192, 208, 0.42);
      background: rgba(67, 76, 94, 0.58);
      box-shadow: 0 4px 22px rgba(0, 0, 0, 0.28);
      transform: translateY(-1px);
    }
    .sc-info { flex: 1; min-width: 0; }
    .sc-name {
      font-weight: 600;
      color: #E5E9F0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sc-meta    { font-size: 0.75rem; color: #4C566A; margin-top: 3px; }
    .sc-players { font-size: 0.82rem; color: #88C0D0; white-space: nowrap; flex-shrink: 0; }

    /* ---- Spinner ---- */
    .spinner-wrap { text-align: center; padding: 48px; color: #81A1C1; }
    .spinner {
      display: inline-block;
      width: 38px; height: 38px;
      border: 3px solid rgba(76, 86, 106, 0.38);
      border-top-color: #88C0D0;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Play overlay (full screen) ---- */
    #view-play {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      flex-direction: column;
    }
    #view-play.active { display: flex; }

    #play-toolbar {
      background: rgba(46, 52, 64, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(136, 192, 208, 0.12);
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #play-label {
      flex: 1;
      color: #81A1C1;
      font-size: 0.82rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ClassiCube requirement: canvas must have NO border or padding */
    #canvas {
      display: block;
      border: 0;
      padding: 0;
      background: #000;
    }

    #logmsg {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #BF616A;
      font-size: 0.86rem;
      background: rgba(46, 52, 64, 0.84);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(191, 97, 106, 0.22);
      pointer-events: none;
      white-space: nowrap;
      display: none;
    }

    /* ---- Mouse-capture overlay ---- */
    #mouse-overlay {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      color: #E5E9F0;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    }
    #mouse-overlay.visible { display: flex; }

    /* ---- Custom scrollbar ---- */
    ::-webkit-scrollbar              { width: 6px; }
    ::-webkit-scrollbar-track        { background: transparent; }
    ::-webkit-scrollbar-thumb        { background: rgba(76, 86, 106, 0.5); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: rgba(136, 192, 208, 0.4); }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      #app-body { padding: 16px 12px; }
      .card { padding: 20px; }
      .server-card { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- ================================================================
     App shell
     ================================================================ -->
<div id="app">
  <div id="app-header">
    <h1>◼ ClassiCube Web</h1>
    <div id="header-badges">
      <span id="badge-google" class="badge badge-google"></span>
      <span id="badge-cc"     class="badge badge-cc"></span>
    </div>
  </div>

  <div id="app-body">

    <!-- Initialising -->
    <div id="view-init" class="view active">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p>Loading…</p>
      </div>
    </div>

    <!-- Login (ClassiCube credentials) -->
    <div id="view-login" class="view">
      <div class="card">
        <h2>🔑 Sign in to ClassiCube</h2>
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <div class="field">
          <label>Username</label>
          <input id="login-user" type="text" placeholder="ClassiCube username" autocomplete="username"
                 maxlength="16" pattern="[A-Za-z0-9_]+">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
        </div>
        <div class="field" id="field-2fa" style="display:none">
          <label>Two-Factor Code</label>
          <input id="login-2fa" type="text" placeholder="Check your email for a code"
                 autocomplete="one-time-code" maxlength="16">
        </div>
        <button id="btn-login" class="btn btn-primary btn-block" onclick="doLogin(this)">Sign In</button>
        <div class="divider">or</div>
        <button class="btn btn-gray btn-block" onclick="startSingleplayerOnly()">
          🌍 Play Singleplayer (no ClassiCube account)
        </button>
        <p class="hint">A ClassiCube account is only required for multiplayer.</p>
      </div>
    </div>

    <!-- Home -->
    <div id="view-home" class="view">
      <div class="card">
        <h2>🎮 Play ClassiCube</h2>
        <div id="home-warn" class="alert alert-warn" style="display:none"></div>
        <button class="btn btn-green btn-block" style="margin-bottom:10px" onclick="startSingleplayer()">
          🌍 Play Singleplayer
        </button>
        <button id="btn-browse" class="btn btn-primary btn-block" onclick="showServers()" style="display:none">
          🖧 Browse Multiplayer Servers
        </button>
      </div>
      <div style="text-align:center; margin-top:4px">
        <button class="btn btn-gray btn-sm" onclick="logout()">Sign Out of ClassiCube</button>
      </div>
    </div>

    <!-- Server browser -->
    <div id="view-servers" class="view">
      <div class="server-filters">
        <button class="btn btn-gray btn-sm" onclick="showView('view-home')">← Back</button>
        <input id="server-search" type="text" placeholder="Search servers…" oninput="filterServers()">
        <button class="btn btn-gray btn-sm" onclick="loadServers()">↻ Refresh</button>
      </div>
      <div id="servers-loading" class="spinner-wrap" style="display:none">
        <div class="spinner"></div>
        <p>Loading servers…</p>
      </div>
      <div id="servers-error" class="alert alert-error"
           style="display:none; max-width:900px; margin:0 auto"></div>
      <div id="server-list"></div>
    </div>

  </div><!-- /app-body -->
</div><!-- /app -->

<!-- ================================================================
     Play overlay — outside #app so it covers the entire viewport
     ================================================================ -->
<div id="view-play">
  <div id="play-toolbar">
    <button class="btn btn-red btn-sm" onclick="exitGame()">✕ Exit</button>
    <span id="play-label"></span>
  </div>
  <div id="canvas-wrap">
    <!-- ClassiCube requirement: no border or padding on the canvas -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <button id="mouse-overlay" type="button" title="Click to capture mouse" aria-label="Click to capture mouse. Press Escape to release.">🖱️ Click to capture mouse<br><span style="font-size:0.78rem;opacity:0.7;font-weight:400">Press Escape to release</span></button>
    <span id="logmsg"></span>
  </div>
</div>

<!-- ================================================================
     Application logic
     ================================================================ -->
<script>
// ----------------------------------------------------------------
// State
// ----------------------------------------------------------------
var state = {
  googleEmail:  null,   // populated from getGoogleUser() on boot
  ccUsername:   null,   // populated after ClassiCube login
  loggedIn:     false,  // true when ClassiCube session is active
  verified:     false,  // true when ClassiCube account is email-verified
  servers:      [],
  textureBlob:  null,
  gameActive:   false
};

// ----------------------------------------------------------------
// Boot — fetch Google identity then check for an existing CC session
// ----------------------------------------------------------------
window.addEventListener('DOMContentLoaded', function () {
  google.script.run
    .withSuccessHandler(function (r) {
      state.googleEmail = r.email || 'Unknown';
      showGoogleBadge(state.googleEmail);

      // Now check whether the user already has a live ClassiCube session
      google.script.run
        .withSuccessHandler(function (s) {
          if (s.valid) {
            state.loggedIn  = true;
            state.ccUsername = s.username;
            state.verified  = s.verified;
            showCcBadge(s.username);
            showHome();
          } else {
            showView('view-login');
            focusLoginField();
          }
        })
        .withFailureHandler(function () { showView('view-login'); focusLoginField(); })
        .checkCcSession();
    })
    .withFailureHandler(function () {
      // If we can't even get the Google identity, just show the login screen
      showView('view-login');
      focusLoginField();
    })
    .getGoogleUser();
});

// ----------------------------------------------------------------
// View helpers
// ----------------------------------------------------------------
function showView(id) {
  document.querySelectorAll('#app-body .view').forEach(function (v) {
    v.classList.remove('active');
  });
  var el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function showHome() {
  var warnEl = document.getElementById('home-warn');
  if (state.loggedIn && !state.verified) {
    warnEl.textContent  = 'Your ClassiCube account has not yet been verified. ' +
                          'Multiplayer requires a verified account.';
    warnEl.style.display = 'block';
  } else {
    warnEl.style.display = 'none';
  }

  document.getElementById('btn-browse').style.display =
    (state.loggedIn && state.verified) ? 'flex' : 'none';

  showView('view-home');
}

function showGoogleBadge(email) {
  var el = document.getElementById('badge-google');
  el.textContent  = '🔵 ' + email;
  el.style.display = 'inline-block';
}

function showCcBadge(username) {
  var el = document.getElementById('badge-cc');
  el.textContent  = '🟢 ' + username;
  el.style.display = 'inline-block';
}

function hideCcBadge() {
  var el = document.getElementById('badge-cc');
  el.style.display = 'none';
}

function focusLoginField() {
  var el = document.getElementById('login-user');
  if (el) el.focus();
}

// ----------------------------------------------------------------
// ClassiCube login / logout
// ----------------------------------------------------------------
function doLogin(btn) {
  var user    = document.getElementById('login-user').value.trim();
  var pass    = document.getElementById('login-pass').value;
  var twoFa   = document.getElementById('login-2fa').value.trim();
  var needs2fa = document.getElementById('field-2fa').style.display !== 'none';

  if (!user || !pass) {
    showAlert('login-error', 'Please enter your ClassiCube username and password.');
    return;
  }

  if (!/^[A-Za-z0-9_]{1,16}$/.test(user)) {
    showAlert('login-error', 'Invalid username. Use 1–16 letters, digits, or underscores.');
    return;
  }

  if (needs2fa && !twoFa) {
    showAlert('login-error', 'Please enter the two-factor code from your email.');
    return;
  }

  setBusy(btn, 'Signing in…');
  hideAlert('login-error');

  google.script.run
    .withSuccessHandler(function (r) {
      setReady(btn, 'Sign In');
      if (r.success) {
        state.ccUsername = r.username;
        state.loggedIn   = true;
        state.verified   = r.verified !== false;
        showCcBadge(r.username);
        showHome();
      } else if (r.needsTwoFactor) {
        // Show the 2FA field and prompt the user
        document.getElementById('field-2fa').style.display = 'block';
        showAlert('login-error', 'A two-factor code was sent to your email. Enter it above and sign in again.');
        document.getElementById('login-2fa').focus();
      } else {
        showAlert('login-error', r.error || 'Login failed.');
      }
    })
    .withFailureHandler(function () {
      setReady(btn, 'Sign In');
      showAlert('login-error', 'A server error occurred. Please try again.');
    })
    .loginToClassiCube(user, pass, twoFa);
}

/**
 * Play singleplayer without a ClassiCube account.
 * Uses the first part of the Google email as an in-game display name.
 */
function startSingleplayerOnly() {
  var rawName  = state.googleEmail ? state.googleEmail.split('@')[0] : 'Player';
  var safeName = rawName.replace(/[^A-Za-z0-9_]/g, '').substring(0, 16) || 'Player';
  launchGame(safeName, '', '', '', 'Singleplayer');
}

function logout() {
  google.script.run
    .withSuccessHandler(function () {})
    .withFailureHandler(function () {})
    .logoutCcSession();

  state.ccUsername = null;
  state.loggedIn   = false;
  state.verified   = false;
  hideCcBadge();
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-2fa').value  = '';
  document.getElementById('field-2fa').style.display = 'none';
  showView('view-login');
  focusLoginField();
}

// ----------------------------------------------------------------
// Server browser
// ----------------------------------------------------------------
function showServers() {
  showView('view-servers');
  loadServers();
}

function loadServers() {
  document.getElementById('servers-loading').style.display = 'block';
  document.getElementById('server-list').innerHTML = '';
  hideAlert('servers-error');
  state.servers = [];

  google.script.run
    .withSuccessHandler(function (r) {
      document.getElementById('servers-loading').style.display = 'none';
      if (r.success) {
        state.servers = r.servers;
        renderServers(state.servers);
      } else {
        if (r.error && r.error.indexOf('Session expired') !== -1) {
          handleSessionExpiry();
        } else {
          showAlert('servers-error', r.error || 'Failed to load server list.');
        }
      }
    })
    .withFailureHandler(function () {
      document.getElementById('servers-loading').style.display = 'none';
      showAlert('servers-error', 'Failed to load server list. Please try again.');
    })
    .getServerList();
}

function filterServers() {
  var q = document.getElementById('server-search').value.toLowerCase();
  renderServers(
    q ? state.servers.filter(function (s) {
          return s.name.toLowerCase().indexOf(q) !== -1 ||
                 (s.software || '').toLowerCase().indexOf(q) !== -1;
        })
      : state.servers
  );
}

function renderServers(list) {
  if (!list.length) {
    document.getElementById('server-list').innerHTML =
      '<div class="alert alert-info" style="max-width:900px;margin:0 auto">No servers found.</div>';
    return;
  }

  var html = '';
  list.forEach(function (s) {
    var players  = (s.players || 0) + '/' + (s.maxplayers || 0);
    var software = esc(s.software || 'ClassiCube');
    var country  = s.country ? ' [' + s.country.toUpperCase() + ']' : '';
    var star     = s.featured ? ' ⭐' : '';
    html +=
      '<div class="server-card">' +
        '<div class="sc-info">' +
          '<div class="sc-name">' + esc(s.name) + star + '</div>' +
          '<div class="sc-meta">'  + software + country + '</div>' +
        '</div>' +
        '<div class="sc-players">' + players + '</div>' +
        '<button class="btn btn-green btn-sm"' +
                ' data-hash="' + esc(s.hash) + '"' +
                ' onclick="joinServer(this)">Join</button>' +
      '</div>';
  });
  document.getElementById('server-list').innerHTML = html;
}

// ----------------------------------------------------------------
// Game
// ----------------------------------------------------------------
function startSingleplayer() {
  launchGame(state.ccUsername, '', '', '', 'Singleplayer');
}

function joinServer(btn) {
  var hash = btn.getAttribute('data-hash');
  if (!hash || !/^[0-9a-f]{32}$/i.test(hash)) {
    alert('Invalid server. Please refresh the server list and try again.');
    return;
  }
  setBusy(btn, 'Connecting…');

  google.script.run
    .withSuccessHandler(function (r) {
      setReady(btn, 'Join');
      if (r.success) {
        launchGame(state.ccUsername, r.mppass, r.ip, r.port, r.name);
      } else if (r.error && r.error.indexOf('Session expired') !== -1) {
        handleSessionExpiry();
      } else {
        alert('Could not connect: ' + (r.error || 'Unknown error'));
      }
    })
    .withFailureHandler(function () {
      setReady(btn, 'Join');
      alert('Failed to fetch server info. Please try again.');
    })
    .getServerInfo(hash);
}

/**
 * Switch to the play overlay and launch ClassiCube.
 * For singleplayer, pass empty strings for mppass/ip/port.
 */
function launchGame(username, mppass, ip, port, label) {
  // Guard against duplicate launches (e.g. double-click on Play/Join).
  if (state.gameActive) return;
  state.gameActive = true;

  var args;
  if (ip) {
    // Validate before building the WebSocket address
    var safeIp   = String(ip).replace(/[^A-Za-z0-9.\-]/g, '');
    var safePort = String(port).replace(/[^0-9]/g, '');
    if (!safeIp || !safePort) {
      state.gameActive = false;
      setLog('Invalid server address. Cannot connect.');
      return;
    }
    // ClassiCube's Emscripten interop builds the WebSocket URL as:
    //   wss://{addr}:{port}/
    // Most ClassiCube servers (MCGalaxy etc.) natively accept WSS on their
    // game port, so we connect directly rather than routing through a proxy.
    args = [username, mppass, safeIp, safePort];
  } else {
    args = [username];
  }

  document.getElementById('view-play').classList.add('active');
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('play-label').textContent = label || 'ClassiCube';
  setLog('Loading textures…');

  // Install the XHR/fetch patch before any game scripts are added to the DOM
  patchRequests_();

  // Fetch texture pack via GAS proxy (avoids CORS on classicube.net/static/default.zip)
  google.script.run
    .withSuccessHandler(function (b64) {
      if (b64) {
        try {
          var raw   = atob(b64);
          var bytes = new Uint8Array(raw.length);
          for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
          state.textureBlob = URL.createObjectURL(
            new Blob([bytes], { type: 'application/zip' })
          );
        } catch (e) {
          console.warn('Could not create texture blob URL:', e);
        }
      }
      startEngine_(args);
    })
    .withFailureHandler(function () {
      // Texture fetch failed — game still launches; ClassiCube will try its own fallback
      startEngine_(args);
    })
    .getTexturePack();
}

/**
 * Intercept XHR/fetch calls for the texture-pack path and redirect them to
 * either the in-memory Blob URL (preferred) or classicube.net (fallback).
 * Also intercepts ClassiCube.wasm fetches and serves them via the GAS proxy
 * so that cs.classicube.net does not need to be reachable from the browser.
 * Must be called before ClassiCube.js is loaded.
 */
function patchRequests_() {
  if (window.__ccPatched) return;
  window.__ccPatched = true;

  function textureUrl_() {
    return state.textureBlob || 'https://classicube.net/static/default.zip';
  }

  function isTexturePack_(u) {
    return typeof u === 'string' &&
           (u === '/static/default.zip' || u.slice(-12) === '/default.zip');
  }

  function isWasm_(u) {
    return typeof u === 'string' && u.indexOf('ClassiCube.wasm') !== -1;
  }

  // Build a Response object carrying the raw WASM bytes.
  function makeWasmResponse_(buffer) {
    return new Response(buffer, {
      status: 200,
      statusText: 'OK',
      headers: { 'Content-Type': 'application/wasm' }
    });
  }

  // Fetch ClassiCube.wasm via the GAS server-side proxy and resolve with a
  // proper binary Response.  Falls back to a direct fetch if the proxy fails.
  function fetchWasmViaGas_(input, init) {
    // Reuse a previously decoded ArrayBuffer to avoid duplicate GAS calls.
    if (window.__ccWasmBuffer) {
      return Promise.resolve(makeWasmResponse_(window.__ccWasmBuffer));
    }
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(function (b64) {
          if (b64) {
            try {
              var bstr  = atob(b64);
              var bytes = new Uint8Array(bstr.length);
              for (var i = 0; i < bstr.length; i++) bytes[i] = bstr.charCodeAt(i);
              window.__ccWasmBuffer = bytes.buffer;
              resolve(makeWasmResponse_(bytes.buffer));
              return;
            } catch (e) {
              console.warn('[CC] WASM decode error:', e);
            }
          }
          // GAS proxy returned nothing — try directly (may fail if blocked).
          origFetch.apply(window, [input, init]).then(resolve).catch(reject);
        })
        .withFailureHandler(function () {
          origFetch.apply(window, [input, init]).then(resolve).catch(reject);
        })
        .getGameWasm();
    });
  }

  var origOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function (method, url) {
    if (isTexturePack_(url)) arguments[1] = textureUrl_();
    return origOpen.apply(this, arguments);
  };

  if (window.fetch) {
    var origFetch = window.fetch;
    window.fetch = function (input, init) {
      var url = typeof input === 'string' ? input
              : (input && input.url) ? input.url : String(input);
      if (isTexturePack_(url)) {
        return origFetch.call(this, textureUrl_(), init);
      }
      if (isWasm_(url)) {
        return fetchWasmViaGas_(input, init);
      }
      return origFetch.apply(this, arguments);
    };
  }
}

/**
 * Initialise the Emscripten Module object and load ClassiCube.js.
 * ClassiCube.js is fetched via the GAS server-side proxy so that
 * cs.classicube.net does not need to be reachable from the browser.
 * Falls back to a direct <script> tag if the proxy call fails.
 */
function startEngine_(args) {
  resizeCanvas_();
  setLog('Loading game…');

  window.Module = {
    preRun:  [resizeCanvas_],
    postRun: [],
    arguments: args,
    print: function (text) {
      if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
      console.log(text);
    },
    printErr: function (text) {
      if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
      console.error(text);
    },
    canvas: document.getElementById('canvas'),
    setStatus: function (text) {
      console.log('[CC]', text);
      setLog(text);
    },
    totalDependencies: 0,
    monitorRunDependencies: function (left) {
      this.totalDependencies = Math.max(this.totalDependencies, left);
      Module.setStatus(
        left ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
             : 'All downloads complete.'
      );
    },
    // Force absolute URLs for all Emscripten asset loads (ClassiCube.wasm etc.)
    // so that our fetch patch can intercept them regardless of how ClassiCube.js
    // was loaded (eval vs. <script> tag, which affect document.currentScript).
    locateFile: function (path /*, scriptDir */) {
      return 'https://cs.classicube.net/client/latest/' + path;
    }
  };

  window.onerror = function (msg) {
    Module.setStatus('Exception: ' + msg);
    Module.setStatus = function (text) {
      if (text) Module.printErr('[post-exception] ' + text);
    };
  };

  // ---- Pointer-lock handling ----
  // ClassiCube requests pointer lock internally on mouse-click, but we add an
  // explicit supplemental handler and a visible overlay so users always know
  // how to (re-)capture the mouse after pressing Escape.
  var canvas  = document.getElementById('canvas');
  var overlay = document.getElementById('mouse-overlay');

  // Feature-detect Pointer Lock API (including vendor-prefixed variants).
  var requestPointerLock_ = canvas.requestPointerLock
                         || canvas.mozRequestPointerLock
                         || canvas.webkitRequestPointerLock
                         || null;

  if (!requestPointerLock_) {
    // Pointer Lock not supported — hide the overlay so it is never shown.
    overlay.style.display = 'none';
  } else {
    // Normalise pointerLockElement access once.
    function getPointerLockElement_() {
      return document.pointerLockElement
          || document.mozPointerLockElement
          || document.webkitPointerLockElement
          || null;
    }

    function onPointerLockChange() {
      if (getPointerLockElement_() === canvas) {
        overlay.classList.remove('visible');
      } else if (state.gameActive) {
        overlay.classList.add('visible');
      }
    }

    document.addEventListener('pointerlockchange',       onPointerLockChange);
    document.addEventListener('mozpointerlockchange',    onPointerLockChange);
    document.addEventListener('webkitpointerlockchange', onPointerLockChange);

    function requestLock() {
      if (getPointerLockElement_() !== canvas) {
        try {
          var p = requestPointerLock_.call(canvas);
          // Modern browsers return a Promise; handle rejection (e.g. iframe
          // permission policy denying pointer lock) so the overlay does not
          // permanently block the game canvas.
          if (p && typeof p.catch === 'function') {
            p.catch(function (err) {
              console.warn('[CC] Pointer lock denied:', err);
              // Permanently hide the overlay — pointer lock is unavailable.
              overlay.classList.remove('visible');
              overlay.style.display = 'none';
              overlay.removeEventListener('click', requestLock);
              canvas.removeEventListener('click',  requestLock);
            });
          }
        } catch (e) {
          // Synchronous throw (older browsers or out-of-gesture context).
          console.warn('[CC] requestPointerLock threw:', e);
          overlay.classList.remove('visible');
          overlay.style.display = 'none';
        }
      }
    }

    overlay.addEventListener('click', requestLock);
    canvas.addEventListener('click',  requestLock);

    // Show the overlay immediately so the user knows to click before the game loads
    overlay.classList.add('visible');
  }

  // Load ClassiCube.js via the GAS proxy so cs.classicube.net does not need
  // to be reachable from the browser.  On failure the direct URL is used as
  // a best-effort fallback.
  google.script.run
    .withSuccessHandler(function (jsCode) {
      if (jsCode) {
        try {
          // Indirect eval runs in global scope so that Emscripten's
          // `typeof Module != 'undefined'` check finds window.Module.
          // eslint-disable-next-line no-eval
          (0, eval)(jsCode);
        } catch (e) {
          console.error('[CC] Error evaluating ClassiCube.js:', e);
          setLog('Game load error. Please refresh and try again.');
        }
      } else {
        loadClassiCubeDirect_();
      }
    })
    .withFailureHandler(loadClassiCubeDirect_)
    .getGameScript();
}

/**
 * Fallback: inject ClassiCube.js as a <script> tag pointing directly at
 * cs.classicube.net.  This may fail if the domain is blocked.
 */
function loadClassiCubeDirect_() {
  var script = document.createElement('script');
  script.async   = true;
  script.src     = 'https://cs.classicube.net/client/latest/ClassiCube.js';
  script.onerror = function () {
    setLog('Failed to load game. cs.classicube.net may be blocked.');
  };
  document.body.appendChild(script);
}

/** Fit the canvas inside its wrapper maintaining a 16:9 aspect ratio. */
function resizeCanvas_() {
  var wrap   = document.getElementById('canvas-wrap');
  var canvas = document.getElementById('canvas');
  if (!wrap || !canvas) return;

  var dpr    = window.devicePixelRatio || 1;
  var avW    = wrap.clientWidth;
  var avH    = wrap.clientHeight;
  var aspect = 16 / 9;

  var w, h;
  if (avW / avH > aspect) { h = avH; w = Math.floor(h * aspect); }
  else                     { w = avW; h = Math.floor(w / aspect); }

  if (w % 2) w--;   // Emscripten prefers even dimensions
  if (h % 2) h--;

  canvas.width        = w * dpr;
  canvas.height       = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
}

/**
 * Exit the game. Reloading is the cleanest way to tear down the
 * WebAssembly runtime; the ClassiCube session persists server-side
 * so the user returns to the home screen without logging in again.
 */
function exitGame() {
  if (!confirm('Exit the game? Any unsaved progress will be lost.')) return;
  location.reload();
}

// ----------------------------------------------------------------
// Session expiry handler
// ----------------------------------------------------------------
function handleSessionExpiry() {
  state.loggedIn   = false;
  state.ccUsername = null;
  state.verified   = false;
  hideCcBadge();
  alert('Your ClassiCube session has expired. Please sign in again.');
  showView('view-login');
  focusLoginField();
}

// ----------------------------------------------------------------
// UI utilities
// ----------------------------------------------------------------
function setLog(text) {
  var el = document.getElementById('logmsg');
  el.textContent  = text;
  el.style.display = text ? 'block' : 'none';
}

function esc(str) {
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

function showAlert(id, msg) {
  var el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function hideAlert(id) {
  var el = document.getElementById(id);
  if (el) el.style.display = 'none';
}
function setBusy(btn, text)  { btn.disabled = true;  btn.textContent = text; }
function setReady(btn, text) { btn.disabled = false; btn.textContent = text; }

window.addEventListener('resize', function () {
  if (state.gameActive) resizeCanvas_();
});

// Keyboard shortcuts for the login form
document.getElementById('login-pass').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') {
    var f2fa = document.getElementById('field-2fa');
    if (f2fa.style.display !== 'none') {
      document.getElementById('login-2fa').focus();
    } else {
      document.getElementById('btn-login').click();
    }
  }
});
document.getElementById('login-user').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});
document.getElementById('login-2fa').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});
</script>
